<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Huatan Milk Tea</title>
  <style>
:root{
  --brown:#5b351d; --brown2:#7a4a2b; --cream:#fff6df; --cream2:#ffe8bd;
  --green:#7fba43; --red:#e56b55; --shadow:0 14px 34px rgba(56,32,12,.20);
}
*{box-sizing:border-box} body{margin:0;font-family:Verdana, Geneva, sans-serif;background:#f6dfb7;color:var(--brown);overflow:hidden}
button{font-family:inherit;cursor:pointer;border:0} .screen{display:none;width:100vw;height:100vh;position:relative}.screen.active{display:block}
#intro{background:radial-gradient(circle at center,#fff4cf 0,#f7c97f 45%,#b06d31 100%);overflow:hidden}.intro-card{position:absolute;inset:8vh 10vw;margin:auto;max-width:720px;height:max-content;text-align:center;background:rgba(255,250,234,.86);border:5px solid rgba(92,53,29,.28);border-radius:38px;padding:42px;box-shadow:var(--shadow);animation:pop .8s ease both}.logo{width:min(360px,55vw);filter:drop-shadow(0 12px 20px rgba(0,0,0,.25))}.intro-card h1{font-size:clamp(44px,7vw,86px);margin:10px 0 5px}.intro-card p{font-size:clamp(20px,3vw,34px);margin:0 0 26px}.primary-btn{font-size:clamp(22px,3.2vw,38px);padding:16px 42px;border-radius:999px;background:linear-gradient(#9ed85c,#63a52c);color:white;box-shadow:0 8px 0 #3f751b,0 14px 26px rgba(0,0,0,.16);font-weight:900}.primary-btn:active{transform:translateY(4px);box-shadow:0 4px 0 #3f751b}.floating-bubbles:before,.floating-bubbles:after{content:"";position:absolute;inset:0;background:radial-gradient(circle,#fff8 0 10px,transparent 12px);background-size:90px 90px;animation:rise 12s linear infinite}.floating-bubbles:after{animation-duration:18s;opacity:.5;background-size:140px 140px}
.topbar{height:92px;background:linear-gradient(#704021,#3e210f);color:#fff6dc;text-align:center;padding:8px 18px;box-shadow:0 8px 20px rgba(0,0,0,.25);position:relative;z-index:5}.topbar h2{font-size:clamp(28px,3.9vw,54px);letter-spacing:5px;margin:0 0 6px;line-height:1}.progress{display:flex;justify-content:center;gap:8px;flex-wrap:wrap}.step-pill{padding:7px 15px;border-radius:999px;background:rgba(255,255,255,.18);font-weight:800;font-size:clamp(14px,1.3vw,20px)}.step-pill.done{background:#82bd3f;color:white}.step-pill.now{background:#ffd56b;color:#4a2b16;animation:pulse 1.2s infinite}
#game{background:linear-gradient(rgba(255,244,214,.88),rgba(255,244,214,.88)),url('https://github.com/nelsonsia27/TeaShop/blob/main/shop-inside.png?raw=true') center/cover no-repeat}.role-area{height:calc(100vh - 92px);display:grid;grid-template-columns:1fr 1fr;gap:18px;padding:18px}.role-panel{min-height:0;background:rgba(255,250,235,.96);border:5px solid rgba(111,68,33,.25);border-radius:24px;padding:16px;box-shadow:var(--shadow);display:flex;flex-direction:column;position:relative;transition:.25s;overflow:hidden}.role-panel.active-reader{border-color:#76bd38;box-shadow:0 0 0 7px rgba(126,193,69,.20),0 0 28px rgba(126,193,69,.72),var(--shadow);transform:translateY(-2px)}.role-panel.locked{filter:saturate(.62);opacity:.68}.role-panel.locked button{pointer-events:none}.role-header{display:flex;align-items:center;gap:12px;margin-bottom:10px;flex:0 0 auto}.role-header.right{justify-content:flex-end;text-align:right}.avatar{font-size:38px;background:#fff3d7;border-radius:50%;width:60px;height:60px;display:grid;place-items:center;border:3px solid #e0b978}.role-header h3{font-size:clamp(22px,2vw,32px);margin:0;line-height:1}.role-header span{font-size:clamp(13px,1.15vw,18px);font-weight:700;opacity:.75}.speech-bubble{min-height:92px;font-size:clamp(18px,1.75vw,29px);line-height:1.28;background:white;border:4px solid #d4a768;border-radius:24px;padding:16px 20px;margin-bottom:14px;display:block;flex:0 0 auto}.speech-bubble.tap-to-continue{cursor:pointer;box-shadow:0 0 0 5px rgba(127,186,67,.24),0 0 18px rgba(127,186,67,.55);animation:readGlow 1.1s infinite}.speech-bubble.tap-to-continue:after{content:"Tap after reading";display:block;margin-top:8px;font-size:14px;font-weight:900;color:#79a43f;letter-spacing:.5px}.cashier-bubble{background:#fff8e8}.typed-choice{color:#258032;font-weight:900;display:inline}.soft-text{opacity:.65;font-weight:800}.blank{display:inline-block;min-width:130px;border-bottom:4px dotted #b47a32;color:transparent}.choice-grid{display:grid;gap:12px;align-content:start;flex:1;min-height:0;overflow:hidden}.choice-grid.words{grid-template-columns:repeat(2,minmax(0,1fr));grid-auto-rows:minmax(62px,1fr)}.word-card,.image-card{border:3px solid #d7aa68;background:linear-gradient(#fffaf0,#ffe6bd);border-radius:18px;min-height:58px;font-size:clamp(16px,1.45vw,25px);font-weight:900;color:#5b351d;box-shadow:0 5px 0 #c08d4a;display:flex;align-items:center;justify-content:center;text-align:center;padding:8px 10px;transition:.15s;line-height:1.15}.word-card:hover,.image-card:hover{transform:translateY(-2px);box-shadow:0 7px 0 #c08d4a}.word-card.selected,.image-card.correct{background:linear-gradient(#b6eb72,#74bd39);color:white;border-color:#568d25}.image-card.wrong{animation:shake .35s;background:#ffb1a4;border-color:#d8442e}.choice-grid.images{grid-template-columns:repeat(auto-fit,minmax(122px,1fr));grid-auto-rows:minmax(126px,1fr)}.image-card{min-height:120px;flex-direction:column;gap:5px;font-size:clamp(13px,1.1vw,18px);position:relative}.image-card img{max-width:100%;height:min(78px,11vh);object-fit:contain;filter:drop-shadow(0 6px 8px rgba(0,0,0,.17))}.no-icon{width:70px;height:70px;border-radius:18px;background:#fff4df;border:3px dashed #d2a366;display:grid;place-items:center;font-size:24px;font-weight:900;color:#7a4a2b}.image-card .mini-sparkle{position:absolute;inset:0;margin:auto;width:100px;height:100px;pointer-events:none;opacity:0;animation:spark .7s ease}.action-row{display:flex;gap:14px;margin-top:12px;flex:0 0 auto}.hidden{display:none!important}.confirm-btn,.change-btn{flex:1;min-height:56px;border-radius:18px;color:white;font-size:clamp(18px,1.8vw,29px);font-weight:900;box-shadow:0 5px 0 rgba(0,0,0,.22)}.confirm-btn{background:linear-gradient(#a9e85f,#62aa2b)}.change-btn{background:linear-gradient(#ff907d,#e04f39)}.waiting{font-size:clamp(16px,1.35vw,22px);font-weight:800;color:#7b614e;background:#fff8e8;border:3px dashed #dec092;border-radius:20px;padding:18px;text-align:center;align-self:start}
#final{background:linear-gradient(140deg,#fbe5bd,#fff6df 45%,#e1b06d)}.final-wrap{height:100%;padding:14px 18px;display:flex;flex-direction:column;min-height:0}.ready-banner{text-align:center;font-size:clamp(28px,4vw,56px);font-weight:900;color:#5b351d;text-shadow:0 4px #fff;margin:0 0 8px;line-height:1}.final-grid{display:grid;grid-template-columns:1.05fr .95fr;gap:18px;flex:1;min-height:0}.drink-stage,.receipt{background:rgba(255,250,235,.93);border:5px solid rgba(111,68,33,.25);border-radius:30px;box-shadow:var(--shadow);position:relative;overflow:hidden}.preparing{position:absolute;top:14px;left:0;right:0;text-align:center;font-size:clamp(18px,2vw,26px);font-weight:900;color:#7a4a2b;z-index:10}.drink-builder{position:absolute;left:50%;top:54%;transform:translate(-50%,-50%);width:min(470px,38vw,58vh);aspect-ratio:620/900}.drink-layer,.sparkle{position:absolute;left:0;top:0;width:100%;height:100%;object-fit:contain;opacity:0;transform:translateY(36px) scale(.98);transform-origin:center bottom;pointer-events:none}.flavor-layer{z-index:1}.bottom-layer{z-index:2}.ice-layer{z-index:3}.top-layer{z-index:4}.cup-layer{z-index:5}.sparkle{z-index:8;opacity:0;transform:none;mix-blend-mode:screen}.receipt{padding:18px 20px;display:flex;flex-direction:column;gap:7px;min-height:0}.receipt h3{text-align:center;font-size:clamp(28px,3vw,38px);margin:0;border-bottom:4px dashed #b47a32;padding-bottom:8px}.receipt-row{display:grid;grid-template-columns:50px 1fr;align-items:center;gap:10px;font-size:clamp(16px,1.5vw,21px);font-weight:800;background:#fff7e8;border-radius:16px;padding:7px 10px;min-height:62px}.receipt-icon{width:50px;height:50px;display:grid;place-items:center;font-size:24px;color:#b47a32}.receipt-row img{width:48px;height:48px;object-fit:contain}.total{margin-top:auto;text-align:center;font-size:clamp(28px,3.2vw,42px);font-weight:900;background:#85bd42;color:white;border-radius:20px;padding:12px}.final-actions{text-align:center;margin-top:8px;flex:0 0 auto}.final-actions .primary-btn{font-size:clamp(20px,2.4vw,32px);padding:12px 36px}
@keyframes pop{from{transform:scale(.75);opacity:0}to{transform:scale(1);opacity:1}}@keyframes rise{from{transform:translateY(100px)}to{transform:translateY(-300px)}}@keyframes pulse{50%{transform:scale(1.08)}}@keyframes readGlow{50%{box-shadow:0 0 0 7px rgba(127,186,67,.15),0 0 26px rgba(127,186,67,.75)}}@keyframes shake{20%{transform:translateX(-10px)}40%{transform:translateX(10px)}60%{transform:translateX(-7px)}80%{transform:translateX(7px)}}@keyframes spark{0%{opacity:0;transform:scale(.4)}45%{opacity:1;transform:scale(1.1)}100%{opacity:0;transform:scale(1.6)}}
@media(max-width:1100px){.word-card{font-size:clamp(15px,1.8vw,22px)}.speech-bubble{font-size:clamp(17px,2vw,25px)}}
@media(max-width:900px){body{overflow:auto}.screen{min-height:100vh;height:auto}.role-area,.final-grid{grid-template-columns:1fr;height:auto}.choice-grid.words,.choice-grid.images{grid-template-columns:1fr 1fr}.topbar{height:auto}.drink-stage{height:620px}.receipt{min-height:520px}.final-wrap{height:auto;min-height:100vh}.drink-builder{width:min(420px,82vw)}}

</style>
</head>
<body>
  <main id="app">
    <section id="intro" class="screen active">
      <div class="floating-bubbles"></div>
      <div class="intro-card">
        <img class="logo" src="https://github.com/nelsonsia27/TeaShop/blob/main/logo.png?raw=true" alt="Huatan Milk Tea Logo">
        <h1>Huatan Milk Tea</h1>
        <p>English Ordering Simulation</p>
        <button id="startBtn" class="primary-btn">Start Order</button>
      </div>
    </section>

    <section id="game" class="screen">
      <header class="topbar">
        <h2>HUATAN MILK TEA</h2>
        <div id="progress" class="progress"></div>
      </header>

      <section class="role-area">
        <article id="customerPanel" class="role-panel customer active-reader">
          <div class="role-header">
            <div class="avatar">🧑</div>
            <div>
              <h3>Customer</h3>
              <span id="customerStatus">Read and choose.</span>
            </div>
          </div>
          <div id="customerBubble" class="speech-bubble customer-bubble"></div>
          <div id="customerChoices" class="choice-grid words"></div>
          <div id="customerActions" class="action-row hidden">
            <button id="confirmBtn" class="confirm-btn">✓ Confirm</button>
            <button id="changeBtn" class="change-btn">✕ Change</button>
          </div>
        </article>

        <article id="cashierPanel" class="role-panel cashier locked">
          <div class="role-header right">
            <div>
              <h3>Cashier</h3>
              <span id="cashierStatus">Wait for customer.</span>
            </div>
            <div class="avatar">👩‍🍳</div>
          </div>
          <div id="cashierBubble" class="speech-bubble cashier-bubble"></div>
          <div id="cashierChoices" class="choice-grid images"></div>
        </article>
      </section>
    </section>

    <section id="final" class="screen">
      <div class="final-wrap">
        <div class="ready-banner">Your drink is ready!</div>
        <div class="final-grid">
          <div class="drink-stage">
            <div id="preparing" class="preparing">Preparing your drink<span>.</span><span>.</span><span>.</span></div>
            <div id="drinkBuilder" class="drink-builder">
              <img id="layerBottom1" class="drink-layer bottom-layer" alt="">
              <img id="layerBottom2" class="drink-layer bottom-layer" alt="">
              <img id="layerFlavor" class="drink-layer flavor-layer" alt="">
              <img id="layerIce" class="drink-layer ice-layer" alt="">
              <img id="layerCup" class="drink-layer cup-layer" alt="">
              <img id="layerTop1" class="drink-layer top-layer" alt="">
              <img id="layerTop2" class="drink-layer top-layer" alt="">
              <img id="sparkle" class="sparkle hidden" src="https://github.com/nelsonsia27/TeaShop/blob/main/sparkle.gif?raw=true" alt="sparkle">
            </div>
          </div>
          <aside id="receipt" class="receipt"></aside>
        </div>
        <div class="final-actions">
          <button id="playAgainBtn" class="primary-btn">Play Again</button>
        </div>
      </div>
    </section>
  </main>
  <script>
const ASSETS = {
  logo:'https://github.com/nelsonsia27/TeaShop/blob/main/logo.png?raw=true',
  sparkle:'https://github.com/nelsonsia27/TeaShop/blob/main/sparkle.gif?raw=true',
  cups:{
    small:'https://github.com/nelsonsia27/TeaShop/blob/main/cup-small.png?raw=true',
    medium:'https://github.com/nelsonsia27/TeaShop/blob/main/cup-medium.png?raw=true',
    large:'https://github.com/nelsonsia27/TeaShop/blob/main/cup-large.png?raw=true'
  },
  flavorFill:{
    classic:'https://github.com/nelsonsia27/TeaShop/blob/main/classic-fill.png?raw=true',
    brownSugar:'https://github.com/nelsonsia27/TeaShop/blob/main/brown-sugar-fill.png?raw=true',
    jasmine:'https://github.com/nelsonsia27/TeaShop/blob/main/Jasmine-fill.png?raw=true',
    taro:'https://github.com/nelsonsia27/TeaShop/blob/main/Taro-fill.png?raw=true',
    chocolate:'https://github.com/nelsonsia27/TeaShop/blob/main/Chocolate-fill.png?raw=true'
  },
  ingredients:{
    classic:'https://github.com/nelsonsia27/TeaShop/blob/main/classic.png?raw=true',
    brownSugar:'https://github.com/nelsonsia27/TeaShop/blob/main/brown-sugar.png?raw=true',
    jasmine:'https://github.com/nelsonsia27/TeaShop/blob/main/jasmine.png?raw=true',
    taro:'https://github.com/nelsonsia27/TeaShop/blob/main/taro.png?raw=true',
    chocolate:'https://github.com/nelsonsia27/TeaShop/blob/main/chocolate.png?raw=true'
  },
  iceFill:{
    '100':'https://github.com/nelsonsia27/TeaShop/blob/main/100-ice-fill.png?raw=true',
    '50':'https://github.com/nelsonsia27/TeaShop/blob/main/50-ice-fill.png?raw=true',
    '30':'https://github.com/nelsonsia27/TeaShop/blob/main/30-ice-fill.png?raw=true'
  },
  toppingsIcon:{
    eggPudding:'https://github.com/nelsonsia27/TeaShop/blob/main/egg-pudding.png?raw=true',
    taroBalls:'https://github.com/nelsonsia27/TeaShop/blob/main/taro-balls.png?raw=true',
    iceCream:'https://github.com/nelsonsia27/TeaShop/blob/main/ice-cream.png?raw=true',
    grassJelly:'https://github.com/nelsonsia27/TeaShop/blob/main/grass-jelly.png?raw=true',
    cheeseFoam:'https://github.com/nelsonsia27/TeaShop/blob/main/cheese-foam.png?raw=true',
    coconutJelly:'https://github.com/nelsonsia27/TeaShop/blob/main/coconut-jelly.png?raw=true'
  },
  toppingsFill:{
    coconutJelly:'https://github.com/nelsonsia27/TeaShop/blob/main/coconut-jelly-fill.png?raw=true',
    grassJelly:'https://github.com/nelsonsia27/TeaShop/blob/main/grass-jelly-fill.png?raw=true',
    taroBalls:'https://github.com/nelsonsia27/TeaShop/blob/main/taro-ball-fill%20(2).png?raw=true',
    iceCream:'https://github.com/nelsonsia27/TeaShop/blob/main/ice-cream-fill.png?raw=true',
    cheeseFoam:'https://github.com/nelsonsia27/TeaShop/blob/main/cheese-foam-fill.png?raw=true',
    eggPudding:'https://github.com/nelsonsia27/TeaShop/blob/main/egg-pudding-fill.png?raw=true'
  }
};

const prices = { small:40, medium:50, large:60, topping:10 };
const steps = [
 {id:'flavor', label:'Flavor', max:1,
  cashierQ:'Hello! Welcome to our tea shop. What would you like to drink?',
  customerQ:'Hi! I want a {blank}, please.',
  cashierDone:'Alright! One {choice} coming up.',
  options:[['classic','Classic Milk Tea'],['brownSugar','Brown Sugar Milk Tea'],['jasmine','Jasmine Green Tea'],['taro','Taro Milk Tea'],['chocolate','Chocolate Milk Tea']]},
 {id:'size', label:'Size', max:1,
  cashierQ:'Okay! What size do you want? Small, medium, or large?',
  customerQ:'I want a {blank}, please.',
  cashierDone:'Got it. A {choice} cup.',
  options:[['small','Small'],['medium','Medium'],['large','Large']]},
 {id:'ice', label:'Ice', max:1,
  cashierQ:'What ice level would you like? We have 100%, 50%, 30%, or 0%.',
  customerQ:'{blank} ice, please.',
  cashierDone:'Okay. {choice} ice.',
  options:[['100','100%'],['50','50%'],['30','30%'],['0','0%']]},
 {id:'sugar', label:'Sugar', max:1,
  cashierQ:'And what sugar level? We have 100%, 70%, 50%, 30%, or 0%.',
  customerQ:'{blank} sugar, please.',
  cashierDone:'Okay. {choice} sugar.',
  options:[['100','100%'],['70','70%'],['50','50%'],['30','30%'],['0','0%']]},
 {id:'toppings', label:'Toppings', max:2,
  cashierQ:'Do you want to add any toppings? They are 10 dollars each.',
  customerQ:'Yes, I want {blank}.',
  cashierDone:'Great! I added {choice}.',
  options:[['eggPudding','Egg Pudding'],['taroBalls','Taro Balls'],['iceCream','Ice Cream'],['grassJelly','Grass Jelly'],['cheeseFoam','Cheese Foam'],['coconutJelly','Coconut Jelly']]},
];

let current = 0;
let order = {};
let selectedTemp = null;
let turn = 'cashierRead';
const $ = id => document.getElementById(id);

$('startBtn').onclick = () => { show('game'); initStep(); };
$('playAgainBtn').onclick = () => location.reload();
$('customerBubble').onclick = () => onBubbleClick('customer');
$('cashierBubble').onclick = () => onBubbleClick('cashier');
$('changeBtn').onclick = () => beginCustomerChoose();
$('confirmBtn').onclick = () => confirmCustomerChoice();

function show(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  $(id).classList.add('active');
}

function initStep(){
  selectedTemp = null;
  updateProgress();
  beginCashierRead();
}

function updateProgress(){
  $('progress').innerHTML = steps.map((s,i)=>`<span class="step-pill ${i<current?'done':i===current?'now':''}">${i<current?'✓ ':''}${s.label}</span>`).join('');
}

function setActive(who, instruction){
  const cActive = who === 'customer';
  const kActive = who === 'cashier';
  $('customerPanel').classList.toggle('active-reader', cActive);
  $('cashierPanel').classList.toggle('active-reader', kActive);
  $('customerPanel').classList.toggle('locked', !cActive);
  $('cashierPanel').classList.toggle('locked', !kActive);
  $('customerStatus').textContent = cActive ? instruction : 'Wait and listen.';
  $('cashierStatus').textContent = kActive ? instruction : 'Wait and listen.';
}

function beginCashierRead(){
  const st = steps[current];
  turn = 'cashierRead';
  setActive('cashier','Read aloud. Tap the sentence when finished.');
  $('cashierBubble').innerHTML = st.cashierQ;
  $('cashierBubble').classList.add('tap-to-continue');
  $('customerBubble').innerHTML = '<span class="soft-text">Listen to the cashier.</span>';
  $('customerChoices').innerHTML = '<div class="waiting">Cashier reads first.</div>';
  $('cashierChoices').innerHTML = '<div class="waiting">Tap the sentence after reading.</div>';
  $('customerActions').classList.add('hidden');
}

function beginCustomerChoose(){
  const st = steps[current];
  turn = 'customerChoose';
  selectedTemp = st.max === 1 ? null : [];
  setActive('customer','Choose your answer, then confirm.');
  $('cashierBubble').classList.remove('tap-to-continue');
  $('cashierBubble').innerHTML = st.cashierQ;
  $('customerBubble').innerHTML = st.customerQ.replace('{blank}', '<span class="blank">____</span>');
  $('customerBubble').classList.remove('tap-to-continue');
  $('customerActions').classList.add('hidden');
  $('customerChoices').innerHTML = '';
  $('cashierChoices').innerHTML = '<div class="waiting">Customer chooses first.</div>';
  st.options.forEach(([key,label])=>{
    const b = document.createElement('button');
    b.className = 'word-card';
    b.textContent = label;
    b.onclick = () => selectCustomer(key,label,b);
    $('customerChoices').appendChild(b);
  });
}

function selectCustomer(key,label,btn){
  const st = steps[current];
  if(turn !== 'customerChoose') return;
  if(st.max === 1){
    selectedTemp = key;
    document.querySelectorAll('.word-card').forEach(x=>x.classList.remove('selected'));
    btn.classList.add('selected');
    fillCustomerSentence(label);
  } else {
    let arr = Array.isArray(selectedTemp) ? selectedTemp : [];
    if(arr.includes(key)){
      arr = arr.filter(x=>x!==key);
      btn.classList.remove('selected');
    } else if(arr.length < st.max){
      arr.push(key);
      btn.classList.add('selected');
    }
    selectedTemp = arr;
    const labels = arr.map(k=>getLabel(st.id,k));
    fillCustomerSentence(joinWords(labels) || '____');
  }
  $('customerActions').classList.toggle('hidden', st.max === 1 ? !selectedTemp : selectedTemp.length === 0);
}

function fillCustomerSentence(label){
  const st = steps[current];
  $('customerBubble').innerHTML = st.customerQ.replace('{blank}', `<span class="typed-choice">${label}</span>`);
}

function confirmCustomerChoice(){
  const st = steps[current];
  if(!selectedTemp || (Array.isArray(selectedTemp) && !selectedTemp.length)) return;
  order[st.id] = Array.isArray(selectedTemp) ? [...selectedTemp] : selectedTemp;
  turn = 'customerRead';
  setActive('customer','Read your sentence aloud. Tap the sentence when finished.');
  $('customerBubble').classList.add('tap-to-continue');
  $('customerChoices').innerHTML = '<div class="waiting">Read the sentence, then tap the speech bubble.</div>';
  $('customerActions').classList.add('hidden');
}

function beginCashierChoose(){
  const st = steps[current];
  turn = 'cashierChoose';
  setActive('cashier','Select the matching picture.');
  $('customerBubble').classList.remove('tap-to-continue');
  $('cashierBubble').innerHTML = st.cashierQ;
  $('cashierBubble').classList.remove('tap-to-continue');
  $('customerChoices').innerHTML = '<div class="waiting">Cashier is choosing.</div>';
  $('cashierChoices').innerHTML = '';
  st.options.forEach(([key,label])=>{
    const card = document.createElement('button');
    card.className = 'image-card';
    card.dataset.key = key;
    card.innerHTML = `${imgFor(st.id,key) ? `<img src="${imgFor(st.id,key)}" alt="${label}">` : `<div class="no-icon">0%</div>`}<span>${label}</span>`;
    card.onclick = () => checkCashier(card,key);
    $('cashierChoices').appendChild(card);
  });
}

function checkCashier(card,key){
  if(turn !== 'cashierChoose') return;
  const st = steps[current];
  const target = order[st.id];
  const ok = Array.isArray(target) ? target.includes(key) : target === key;
  if(!ok){
    card.classList.remove('wrong'); void card.offsetWidth; card.classList.add('wrong');
    return;
  }
  card.classList.add('correct');
  card.disabled = true;
  card.insertAdjacentHTML('beforeend', `<img class="mini-sparkle" src="${ASSETS.sparkle}" alt="">`);
  if(Array.isArray(target)){
    const done = [...document.querySelectorAll('.image-card.correct')].map(x=>x.dataset.key);
    if(!target.every(k=>done.includes(k))) return;
  }
  setTimeout(beginCashierConfirmRead, 450);
}

function beginCashierConfirmRead(){
  const st = steps[current];
  turn = 'cashierConfirmRead';
  setActive('cashier','Read aloud. Tap the sentence when finished.');
  const selectedLabel = Array.isArray(order[st.id]) ? joinWords(order[st.id].map(k=>getLabel(st.id,k))) : getLabel(st.id, order[st.id]);
  $('cashierBubble').innerHTML = st.cashierDone.replace('{choice}', `<span class="typed-choice">${selectedLabel}</span>`);
  $('cashierBubble').classList.add('tap-to-continue');
  $('cashierChoices').innerHTML = '<div class="waiting">Read the sentence, then tap the speech bubble.</div>';
}

function onBubbleClick(who){
  if(who === 'cashier' && turn === 'cashierRead') beginCustomerChoose();
  else if(who === 'customer' && turn === 'customerRead') beginCashierChoose();
  else if(who === 'cashier' && turn === 'cashierConfirmRead') nextStep();
}

function nextStep(){
  $('cashierBubble').classList.remove('tap-to-continue');
  $('customerBubble').classList.remove('tap-to-continue');
  current++;
  if(current >= steps.length) finishOrder();
  else initStep();
}

function finishOrder(){
  show('final');
  buildReceipt();
  animateDrink();
}

function imgFor(step,key){
  if(step === 'flavor') return ASSETS.ingredients[key];
  if(step === 'size') return ASSETS.cups[key];
  if(step === 'ice') return key === '0' ? '' : ASSETS.iceFill[key];
  if(step === 'sugar') return ''; // sugar is shown as text because it dissolves in the drink
  if(step === 'toppings') return ASSETS.toppingsIcon[key];
  return '';
}

function getLabel(step,key){
  return steps.find(s=>s.id===step)?.options.find(o=>o[0]===key)?.[1] || key;
}

function joinWords(arr){
  if(!arr || !arr.length) return '';
  if(arr.length === 1) return arr[0];
  return `${arr.slice(0,-1).join(', ')} and ${arr[arr.length-1]}`;
}

function total(){
  return prices[order.size] + (order.toppings?.length || 0) * prices.topping;
}

function buildReceipt(){
  const rows = [
    ['Cup Size', getLabel('size', order.size), ASSETS.cups[order.size]],
    ['Flavor', getLabel('flavor', order.flavor), ASSETS.ingredients[order.flavor]],
    ['Ice', `${order.ice}% Ice`, order.ice === '0' ? '' : ASSETS.iceFill[order.ice]],
    ['Sugar', `${order.sugar}% Sugar`, ''],
    ...order.toppings.map(t => ['Topping', getLabel('toppings',t), ASSETS.toppingsIcon[t]])
  ];
  $('receipt').innerHTML = `<h3>Receipt</h3>${rows.map(r=>`<div class="receipt-row"><div class="receipt-icon">${r[2]?`<img src="${r[2]}" alt="">`:'—'}</div><span><small>${r[0]}</small><br>${r[1]}</span></div>`).join('')}<div class="total">Total: ${total()} NTD</div>`;
}

function setLayer(id, src){
  const el = $(id);
  if(src){
    el.src = src;
    el.style.display = 'block';
  } else {
    el.removeAttribute('src');
    el.style.display = 'none';
  }
  el.style.opacity = 0;
  el.style.transform = 'translateY(36px) scale(.98)';
}

function animateDrink(){
  const prep = $('preparing');
  const lower = order.toppings.filter(t => ['eggPudding','coconutJelly','grassJelly','taroBalls'].includes(t));
  const upper = order.toppings.filter(t => ['iceCream','cheeseFoam'].includes(t));

  setLayer('layerFlavor', ASSETS.flavorFill[order.flavor]);
  setLayer('layerTop1', upper[0] ? ASSETS.toppingsFill[upper[0]] : '');
  setLayer('layerTop2', upper[1] ? ASSETS.toppingsFill[upper[1]] : '');
  setLayer('layerBottom1', lower[0] ? ASSETS.toppingsFill[lower[0]] : '');
  setLayer('layerBottom2', lower[1] ? ASSETS.toppingsFill[lower[1]] : '');
  setLayer('layerIce', order.ice === '0' ? '' : ASSETS.iceFill[order.ice]);
  setLayer('layerCup', ASSETS.cups[order.size]);

  $('sparkle').classList.add('hidden');
  $('sparkle').style.opacity = 0;

  prep.textContent = 'Preparing your drink...';
  setTimeout(()=>{ prep.textContent='Pouring milk tea...'; reveal($('layerFlavor'), 0, 1); }, 350);
  setTimeout(()=>{ prep.textContent='Adding bottom toppings...'; reveal($('layerBottom1'), 0, .90); reveal($('layerBottom2'), 120, .90); }, 1050);
  setTimeout(()=>{ prep.textContent = order.ice === '0' ? 'No ice today!' : 'Adding ice...'; reveal($('layerIce'), 0, .82); }, 1750);
  setTimeout(()=>{ prep.textContent='Adding top topping...'; reveal($('layerTop1'), 0, .88); reveal($('layerTop2'), 120, .88); }, 2450);
  setTimeout(()=>{ prep.textContent='Sealing the cup...'; reveal($('layerCup'), 0, .54); }, 3100);
  setTimeout(()=>{ prep.textContent='Finished!'; const sp=$('sparkle'); sp.classList.remove('hidden'); sp.style.opacity=1; wobble(); }, 3750);
}

function reveal(el, delay = 0, finalOpacity = 1){
  if(!el || el.style.display === 'none') return;
  setTimeout(()=>{
    el.style.transition = 'opacity .55s ease, transform .55s cubic-bezier(.2,1.35,.3,1)';
    el.style.opacity = finalOpacity;
    el.style.transform = 'translateY(0) scale(1)';
  }, delay);
}

function wobble(){
  const d = $('drinkBuilder');
  d.animate([
    {transform:'translate(-50%,-50%) rotate(0deg)'},
    {transform:'translate(-50%,-50%) rotate(-2.5deg)'},
    {transform:'translate(-50%,-50%) rotate(2.5deg)'},
    {transform:'translate(-50%,-50%) rotate(0deg)'}
  ], {duration:650, easing:'ease-in-out'});
}

</script>
</body>
</html>
